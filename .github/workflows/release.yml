name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0

jobs:
  build:
    name: Build Windows, Linux and macOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare build metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            package_version="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            package_version="nightly"
          else
            package_version="ci-${GITHUB_RUN_NUMBER}"
          fi
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import platform
          import shutil
          import urllib.request

          version = os.environ["ZIG_VERSION"]
          arch = "aarch64" if platform.machine() == "arm64" else "x86_64"
          target = f"{arch}-macos"
          work = pathlib.Path(os.environ["RUNNER_TEMP"]) / f"zig-{version}"
          archive = work / "zig.tar.xz"
          extract_dir = work / "extract"
          shutil.rmtree(work, ignore_errors=True)
          extract_dir.mkdir(parents=True)

          with urllib.request.urlopen("https://ziglang.org/download/index.json") as response:
              package = json.load(response)[version][target]
          urllib.request.urlretrieve(package["tarball"], archive)

          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          if digest != package["shasum"]:
              raise SystemExit(f"Zig checksum mismatch: {digest}")

          shutil.unpack_archive(archive, extract_dir)
          zig_dir = next(path for path in extract_dir.iterdir() if path.is_dir())
          with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as output:
              output.write(f"{zig_dir}\n")
          PY

      - name: Run tests
        run: zig build test -Doptimize=ReleaseSafe

      - name: Build Linux ELF
        shell: bash
        run: |
          set -euo pipefail
          zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseFast --prefix zig-out/release-linux
          mkdir -p dist
          install -m 0755 zig-out/release-linux/bin/Shellowo-linux-x86_64 "dist/Shellowo-${PACKAGE_VERSION}-linux-x86_64"

      - name: Build Windows executable
        shell: bash
        run: |
          set -euo pipefail
          zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseFast --prefix zig-out/release-windows
          install -m 0755 zig-out/release-windows/bin/Shellowo-windows-x86_64.exe "dist/Shellowo-${PACKAGE_VERSION}-windows-x86_64.exe"

      - name: Package macOS app
        shell: bash
        run: |
          chmod +x scripts/package-macos-app.sh
          BUILD_VERSION="${GITHUB_RUN_NUMBER}" scripts/package-macos-app.sh "${PACKAGE_VERSION}" dist

      - name: Upload Windows executable
        uses: actions/upload-artifact@v7
        with:
          path: dist/Shellowo-${{ env.PACKAGE_VERSION }}-windows-x86_64.exe
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux executable
        uses: actions/upload-artifact@v7
        with:
          path: dist/Shellowo-${{ env.PACKAGE_VERSION }}-linux-x86_64
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS app
        uses: actions/upload-artifact@v7
        with:
          path: dist/Shellowo-${{ env.PACKAGE_VERSION }}-macos-*.zip
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            dist/*.exe
            dist/Shellowo-*-linux-*
            dist/*.zip
          )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
          fi

      - name: Publish nightly prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            dist/*.exe
            dist/Shellowo-*-linux-*
            dist/*.zip
          )
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly "${assets[@]}" \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --title "Shellowo Nightly" \
            --notes "Automated development build from main at ${GITHUB_SHA}."
